<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SkillArcade Onboarding - Slide 2</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                      "on-background": "#1f1b10",

                      "on-tertiary-fixed-variant": "#005234",
                      "on-secondary-container": "#6e0035",
                      "on-secondary": "#ffffff",
                      "surface-bright": "#fff8ef",
                      "surface": "#fff8ef",
                      "background": "#fff8ef",
                      "on-error": "#ffffff",
                      "on-tertiary-fixed": "#002112",
                      "on-surface-variant": "#4d4632",
                      "surface-container": "#f6edda",
                      "surface-container-highest": "#eae2cf",
                      "secondary-fixed-dim": "#ffb1c6",

                      "xs": "4px",
                      "lg": "24px",
                      "gutter": "16px",
                      "xl": "32px",
                      "margin": "20px"
              },
              "fontFamily": {
                      "label-bold": ["Epilogue", "sans-serif"],
                      "label-sm": ["Epilogue", "sans-serif"],

<style>
        /* Fallback for Clash Display if not locally installed */
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&display=swap');
        @font-face {
            font-family: 'Clash Display';
            src: local('Space Grotesk'); /* Using Space Grotesk as a web-safe brutalist fallback for demo */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background min-h-screen flex flex-col px-margin py-margin max-w-md mx-auto relative overflow-hidden">
<!-- Top Action Bar & Progress -->
<header class="w-full flex justify-between items-center z-10 pt-sm">
<button class="font-label-bold text-label-bold text-outline uppercase tracking-wider active:text-on-background transition-colors">
            Skip
        </button>
<!-- Brutalist Progress Dots -->
<div class="flex gap-unit items-center">
<div class="w-sm h-sm rounded-full border-[3px] border-on-background bg-surface-variant"></div>
<div class="w-md h-sm rounded-full border-[3px] border-on-background bg-primary-container shadow-[2px_2px_0px_0px_#121212]"></div>
<div class="w-sm h-sm rounded-full border-[3px] border-on-background bg-surface-variant"></div>
</div>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<!-- Main Visual Area: Asymmetric Pop-Art Bento -->
<main class="flex-1 w-full flex flex-col justify-center items-center relative py-xl mt-lg z-10">
<!-- Center Piece: Large XP Block -->
<div class="bg-primary-container border-[3px] border-on-background shadow-[4px_4px_0px_0px_#121212] rounded-xl flex flex-col items-center justify-center w-56 h-56 transform -rotate-3 z-20 relative">
<div class="absolute -top-3 -right-3 bg-secondary-container border-[3px] border-on-background rounded-full w-8 h-8 flex items-center justify-center shadow-[2px_2px_0px_0px_#121212]">
<span class="material-symbols-outlined text-[16px] text-on-background" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
<span class="font-display-xl text-display-xl text-on-background">500</span>
<span class="font-headline-md text-headline-md text-on-background mt-sm uppercase">Total XP</span>
</div>
<!-- Floating Element: Flame Streak -->
<div class="absolute top-4 right-0 bg-primary-container border-[3px] border-on-background shadow-[4px_4px_0px_0px_#121212] rounded-xl p-sm flex items-center gap-sm transform rotate-6 z-10">
<div class="bg-white border-[2px] border-on-background rounded-full w-10 h-10 flex items-center justify-center">
<span class="material-symbols-outlined text-[24px] text-error" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
</div>
<div class="flex flex-col pr-sm">
<span class="font-label-bold text-label-bold text-on-background">12 DAY</span>
<span class="font-label-sm text-label-sm text-on-background uppercase">Streak</span>
</div>
</div>
<!-- Floating Element: Trophies -->
<div class="absolute bottom-10 left-0 bg-tertiary-container border-[3px] border-on-background shadow-[4px_4px_0px_0px_#121212] rounded-xl p-sm flex items-center gap-sm transform -rotate-6 z-30">
<div class="bg-white border-[2px] border-on-background rounded-lg p-xs flex items-center justify-center">
<span class="material-symbols-outlined text-[24px] text-on-background" style="font-variation-settings: 'FILL' 1;">emoji_events</span>
</div>
<span class="font-headline-md text-headline-md text-on-background pr-sm">3</span>
</div>
<!-- Decorative Background Elements -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 border-[3px] border-outline-variant border-dashed rounded-full -z-10"></div>
</main>
<!-- Content & Action -->
<footer class="w-full flex flex-col gap-xl pb-lg z-10">
<div class="px-sm text-center">
<h1 class="font-display-xl text-display-xl text-on-background leading-[1.1] tracking-tight">
                Earn XP, streaks, and trophies while you learn
            </h1>
</div>
<!-- Brutalist Button -->
<button class="w-full bg-primary-container text-on-background border-[3px] border-on-background shadow-[4px_4px_0px_0px_#121212] rounded-lg py-md px-lg flex justify-center items-center gap-sm active:translate-x-[2px] active:translate-y-[2px] active:shadow-[2px_2px_0px_0px_#121212] transition-all">
<span class="font-label-bold text-label-bold uppercase tracking-wider">Next</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</footer>
</body></html>
