<main class="flex-grow flex flex-col justify-between w-full max-w-md mx-auto h-full">
<!-- Top spacer / Skip action -->
<div class="flex justify-end w-full pt-4">
<!-- Hidden skip for final slide, or could be a close button -->
</div>
<!-- Center Content -->
<div class="flex-grow flex flex-col justify-center items-center space-y-12">
<!-- Graphic Element - Brutalist Pop-Art Vibe -->
<div class="relative w-72 h-72 rounded-xl border-[3px] border-[#121212] shadow-[4px_4px_0px_0px_#121212] bg-tertiary-container overflow-hidden flex items-center justify-center transform -rotate-2">
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-white/40 to-transparent mix-blend-overlay"></div>
<img class="w-full h-full object-cover mix-blend-luminosity opacity-80 scale-110" data-alt="vibrant neon lit retro arcade cabinet screen glowing in the dark with pixel art graphics pop art style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBwGtk2Pgfn_qdAlX8iKcu7i8ptnBVi6ICZsTStzgrLZRA0jHxcMe_ULxgMEd9sHj-K8rvlKsyn5ztZDotIDmayqz1JcVzHCKL6dNA87JLplMpt7u0C8Tf7l0zZq5rfnRfc1qdQhly_vcmnMS7_i6J4A3jIUHS54oM37MD__10ZKnDQNIpIeVgoxfpoPN0SEqZ47Bm5q15aQ1t5r3Ul_Ib2HYiWo6CIgxxv6kXGIwJO4aXiNQwDjDuBqsXxOIFbFwhvTPd0nT9S7SA"/>
<div class="absolute inset-0 bg-secondary/20 mix-blend-color"></div>
<span class="material-symbols-outlined text-[120px] text-[#121212] absolute z-10" data-icon="videogame_asset" data-weight="fill">videogame_asset</span>
</div>
<!-- Typography -->
<div class="text-center space-y-4 px-2">
<h1 class="font-display-xl text-display-xl text-[#121212] uppercase transform rotate-1">Ready to Play?</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[280px] mx-auto">
                    Your ultimate skill-building journey starts right now. Step into the arena.
                </p>
</div>
</div>
<!-- Bottom Actions -->
<div class="w-full space-y-10 pb-4">
<!-- Progress Indicators -->
<div class="flex justify-center items-center space-x-3">
<div class="w-2.5 h-2.5 rounded-full border-[2px] border-[#121212] bg-surface-variant"></div>
<div class="w-2.5 h-2.5 rounded-full border-[2px] border-[#121212] bg-surface-variant"></div>
<div class="w-2.5 h-2.5 rounded-full border-[2px] border-[#121212] bg-surface-variant"></div>
<div class="w-4 h-4 rounded-full border-[3px] border-[#121212] bg-tertiary-container shadow-[2px_2px_0px_0px_#121212]"></div>
</div>
<!-- Button & Links -->
<div class="space-y-6 w-full text-center">
<button class="w-full py-5 px-6 bg-primary-container text-[#121212] font-headline-md text-headline-md uppercase border-[3px] border-[#121212] rounded-xl shadow-[4px_4px_0px_0px_#121212] active:translate-x-[2px] active:translate-y-[2px] active:shadow-[2px_2px_0px_0px_#121212] transition-all flex items-center justify-center gap-3 group">
<span>JUMP INTO SKILLARCADE</span>
<span class="material-symbols-outlined transform group-active:translate-x-1 transition-transform" data-icon="arrow_forward" data-weight="fill">arrow_forward</span>
</button>
<div class="font-label-bold text-label-bold text-on-surface">
                    Already have an account? 
                    <a class="text-secondary underline decoration-[3px] underline-offset-4 hover:text-[#121212] hover:bg-secondary-fixed px-1 transition-colors" href="#">Log in</a>
</div>
