<body class="bg-surface text-on-background min-h-screen flex flex-col font-body-md overflow-hidden antialiased">
<!-- Progress Indicator (Top) -->
<header class="w-full pt-lg px-md flex justify-center gap-sm z-50 relative">
<div class="h-3 w-8 rounded-full border-[3px] border-[#121212] bg-surface-variant"></div>

</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col relative px-md pt-lg pb-md">
<!-- Headline -->
<div class="z-20 mt-md mb-xl relative">
<h1 class="font-headline-lg text-headline-lg text-center max-w-[320px] mx-auto text-[#121212]">
                Design, code, marketing — bite-sized &amp; fun
            </h1>
</div>
<!-- Floating Cards Interactive Canvas -->
<div class="flex-1 relative w-full flex items-center justify-center min-h-[350px]">
<!-- Central Decorative Element -->
<div class="absolute w-40 h-40 rounded-full border-[3px] border-[#121212] border-dashed opacity-20 flex items-center justify-center bg-surface-container">
</div>
<!-- Card 1: Design (Top Leftish) -->
<div class="absolute top-[5%] left-[5%] rotate-[-8deg] bg-secondary-fixed border-[3px] border-[#121212] rounded-xl p-md shadow-[4px_4px_0px_0px_#121212] flex flex-col items-center justify-center z-30 transform hover:-translate-y-1 transition-transform">
<div class="w-12 h-12 bg-white border-[3px] border-[#121212] rounded-full flex items-center justify-center mb-xs shadow-[2px_2px_0px_0px_#121212]">
<span class="material-symbols-outlined text-on-secondary-fixed text-2xl" style="font-variation-settings: 'FILL' 1;">palette</span>
</div>
<span class="font-label-bold text-label-bold text-on-secondary-fixed uppercase">UI/UX</span>
</div>
<!-- Card 2: Code (Middle Right) -->
<div class="absolute top-[35%] right-[2%] rotate-[10deg] bg-tertiary-container border-[3px] border-[#121212] rounded-xl p-md shadow-[4px_4px_0px_0px_#121212] flex flex-col items-center justify-center z-40 transform hover:-translate-y-1 transition-transform">

<span class="material-symbols-outlined text-on-tertiary-container text-2xl" style="font-variation-settings: 'FILL' 1;">terminal</span>
</div>
<span class="font-label-bold text-label-bold text-on-tertiary-container uppercase">Python</span>
</div>

<div class="w-12 h-12 bg-white border-[3px] border-[#121212] rounded-full flex items-center justify-center mb-xs shadow-[2px_2px_0px_0px_#121212]">
<span class="material-symbols-outlined text-on-primary-container text-2xl" style="font-variation-settings: 'FILL' 1;">campaign</span>
</div>
<span class="font-label-bold text-label-bold text-on-primary-container uppercase">Growth</span>
</div>

</div>
